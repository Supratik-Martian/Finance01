name: Mirror to LearnPay Repo

on:
  push:
    branches:
      - main

jobs:
  mirror:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config --global user.name "Repo Mirror Bot"
          git config --global user.email "actions@github.com"

      - name: Push to LearnPay mirror
        run: |
          git remote add mirror https://learnpayinfo:${{ secrets.LEARNPAY_PUSH_TOKEN }}@github.com/learnpayinfo/Finance01.git
          git push mirror main --force
